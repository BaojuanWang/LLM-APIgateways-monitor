# Browsertrix Crawler configuration TEMPLATE.
#
# The real per-capture config is GENERATED by
# archive/archivelib/docker_tools.py::build_browsertrix_config and written to
# <capture>/config/browsertrix_config.yaml, where it is hashed into the capture
# manifest. This file documents the shape and the reasoning; editing it does not
# change what runs. To change crawl behaviour, edit archive/config/archive.toml.
#
# Run pinned by digest, never by tag:
#   docker run --rm --init \
#     -v <capture>/raw/browsertrix:/crawls \
#     -v <capture>/config/browsertrix_config.yaml:/app/crawl-config.yaml:ro \
#     webrecorder/browsertrix-crawler@sha256:<digest> \
#     crawl --config /app/crawl-config.yaml

# Collection name is derived from the capture_id, so the on-disk layout is
# self-describing: collections/<collection>/<collection>.wacz
collection: __COLLECTION__

# Seeds come from archive/archivelib/seeds.py — a bounded, discovered set.
# scopeType: page      -> capture exactly this URL
# scopeType: page-spa  -> same page including in-page (hash) routes
# NEVER an unrestricted host crawl of a third-party service.
seeds:
  - url: https://example.com/
    scopeType: page

# One worker by default: this is a politeness setting, not a performance one.
workers: 1

# Hard bounds. pageLimit is clamped to the number of seeds at generation time,
# so the crawler cannot wander past what was planned.
pageLimit: 8
timeLimit: 600
pageLoadTimeout: 60
behaviorTimeout: 30

# WACZ is the canonical archival artifact; config validation rejects false.
generateWACZ: true
generateCDX: true

# Text extraction into both the pages index and the WARC, so the capture is
# searchable without replaying it.
text:
  - to-pages
  - to-warc

# In-WACZ screenshots. Standalone PNGs are also written under raw/rendered/,
# but those are secondary representations.
screenshot: view,fullPage

# autoscroll only. No autoplay, no form interaction, no click-through: the
# crawler must not submit forms, create accounts, purchase, or log out.
behaviors: autoscroll

# Ads and third-party beacons are part of the observed page and are preserved.
blockAds: false

# A dead seed is evidence, not a fatal error — the capture still completes and
# is still manifested and validated.
failOnFailedSeed: false

# JSONL logs are retained inside the capture as raw evidence.
logging: stats,debug

# Each capture is an independent observation; never resume prior crawl state.
saveState: never

headless: true

# Appended to the default UA so operators can identify and contact the project.
userAgentSuffix: "LLM-APIgateways-archive/0.1 (research; contact via repository)"

# Deliberately absent, and must stay absent:
#   profile:          - would load a saved browser profile (credentials/cookies)
#   --auth / headers  - no Authorization, no API keys, no bypassing auth walls
#   scopeType: host   - would crawl the whole site
