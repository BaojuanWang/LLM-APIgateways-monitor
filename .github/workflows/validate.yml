name: Validate Monitor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout only validation inputs
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts
            data/manual_sites.csv
            data/hvoy_latest.csv
            data/master_sites.csv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile Python scripts
        run: python -m compileall -q scripts

      - name: Validate monitor inputs
        run: python scripts/validate_monitor_inputs.py
