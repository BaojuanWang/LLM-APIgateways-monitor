name: LLM Relay Monitor
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests openpyxl
      - name: Step 1 - Check platform status (all discovered sites)
        run: python scripts/pipeline.py
      - name: Step 2 - Generate summary
        run: python scripts/summarize.py
      # NOTE: screenshots are run LOCALLY (bash scripts/monitor_all.sh or
      # python scripts/screenshot.py), not in CI — keeps the repo from bloating
      # with PNGs on every scheduled run. Liveness stays on Actions (free on
      # public repos).
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ results/
          git diff --staged --quiet || (git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M') UTC" && git pull --rebase origin main && git push)
