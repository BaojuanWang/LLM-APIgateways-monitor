name: LLM Relay Monitor
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests openpyxl playwright
          playwright install chromium
      - name: Step 1 - Check platform status
        run: python scripts/pipeline.py
      - name: Step 2 - Generate summary
        run: python scripts/summarize.py
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ results/
          git diff --staged --quiet || (git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M') UTC" && git pull --rebase origin main && git push)
