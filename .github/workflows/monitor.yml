name: LLM Relay Monitor
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-repo-writes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests openpyxl
      - name: Step 1 - Check platform status (all discovered sites)
        run: python scripts/monitor_runner.py
      - name: Step 2 - Generate summary
        run: python scripts/summarize_runner.py
      # Screenshots run in the separate low-frequency screenshot workflow.
      # That workflow captures only new or content-changed sites.
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ results/
          git diff --staged --quiet || (git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M') UTC" && git pull --rebase origin main && git push)
