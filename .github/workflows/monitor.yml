name: LLM Relay Monitor

on:
  schedule:
    - cron: '0 */4 * * *'  # 每2小时运行一次（UTC时间）
  workflow_dispatch:         # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Step 1 - Fetch hvoy platform list
        run: python scripts/hvoy_tracker.py

      - name: Step 2 - Check platform status
        run: python scripts/pipeline.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ results/
          git diff --staged --quiet || git commit -m "monitor: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
