name: Site Screenshots

on:
  schedule:
    - cron: '0 1,13 * * *'   # 每天 UTC 1:00 和 13:00，避开 monitor 的整点
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Chinese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run screenshot script
        run: python scripts/screenshot.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screenshots/ data/screenshot_hashes.csv data/screenshot_failures.csv
          git diff --staged --quiet || (git commit -m "screenshots: $(date -u '+%Y-%m-%d %H:%M') UTC" && git pull --rebase origin main && git push)
