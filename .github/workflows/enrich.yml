name: Domain Enrichment
on:
  workflow_dispatch:
    inputs:
      full:
        description: "Also run privacy + contacts (Step 2/3). Default: enrichment only."
        type: boolean
        default: false
jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests openpyxl python-whois dnspython
      - name: Step 1 - Domain enrichment (WHOIS/IP/SSL/favicon)
        run: python scripts/enrich.py
      - name: Step 2 - Privacy policy analysis
        if: ${{ inputs.full }}
        run: python scripts/privacy.py
      - name: Step 3 - Contact & affiliate detection
        if: ${{ inputs.full }}
        run: python scripts/contacts.py
      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "enrich: $(date -u '+%Y-%m-%d') UTC"
          # Push back to whatever branch triggered the dispatch (not hard-coded
          # main), so this can run on a feature branch without pulling main's
          # history into it.
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
